services:
  # Backend API
  - type: web
    name: gym-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gym-database
          property: connectionString
      - key: EMAIL_USER
        value: your-email@gmail.com
      - key: EMAIL_PASSWORD
        value: your-app-password
      - key: GYM_NAME
        value: Your Gym Name
      - key: CONTACT_PHONE
        value: +1234567890
      - key: JWT_SECRET
        value: your-super-secret-jwt-key

  # Frontend
  - type: web
    name: gym-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://gym-backend.onrender.com

databases:
  - name: gym-database
    databaseName: gym_db
    user: gym_user
    plan: free 